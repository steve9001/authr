<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!--
    authr menu-bar template icon. Pure black, transparent bg, fill+alpha only.
    Single-story "a": the stem overlaps DEEP into the bowl circle so they fuse over
    a tall seam (one cohesive letter, no detached block). The keyhole is the bowl's
    only counter, so it stays legible all the way down to 16px.
  -->
  <mask id="keyhole">
    <rect x="0" y="0" width="32" height="32" fill="#fff"/>
    <circle cx="12" cy="14" r="3.0" fill="#000"/>
    <path d="M 10.8 13.8 L 13.2 13.8 L 14.0 20.6 L 10.0 20.6 Z" fill="#000"/>
  </mask>
  <g fill="#000000" mask="url(#keyhole)">
    <!-- bowl -->
    <circle cx="14" cy="16.8" r="9"/>
    <!-- stem overlaps deep into the bowl (left edge x18.5 < circle right edge x23) -->
    <rect x="18.5" y="5.6" width="5" height="22.4" rx="2.5"/>
  </g>
</svg>
