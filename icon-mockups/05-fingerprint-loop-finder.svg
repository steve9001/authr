<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Squircle background gradient: deep, to let luminous ridges glow -->
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E1B4B"/>
      <stop offset="0.55" stop-color="#312E81"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>

    <!-- Luminous ridge stroke gradient -->
    <linearGradient id="ridge" x1="300" y1="280" x2="740" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5B4FC"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>

    <!-- Keyhole highlight -->
    <radialGradient id="key" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#E0E7FF"/>
      <stop offset="1" stop-color="#A5B4FC"/>
    </radialGradient>

    <!-- Soft glow for ridges -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Squircle clip for subtle vignette -->
    <clipPath id="squircle">
      <path d="M512 32
               C 196 32, 32 196, 32 512
               C 32 828, 196 992, 512 992
               C 828 992, 992 828, 992 512
               C 992 196, 828 32, 512 32 Z"/>
    </clipPath>
  </defs>

  <!-- Background squircle -->
  <path d="M512 32
           C 196 32, 32 196, 32 512
           C 32 828, 196 992, 512 992
           C 828 992, 992 828, 992 512
           C 992 196, 828 32, 512 32 Z"
        fill="url(#bg)"/>

  <!-- Inner vignette to add depth -->
  <g clip-path="url(#squircle)">
    <radialGradient id="vig" cx="0.5" cy="0.46" r="0.62">
      <stop offset="0" stop-color="#4338CA" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#vig)"/>
  </g>

  <!--
    Fingerprint whorl. Center ~ (512, 500).
    Organic ridges built from open bezier paths, slightly asymmetric,
    with subtle gaps (ridge endings) for a biometric feel.
    Fingerprint occupies central ~60% (radius ~300px from center).
  -->
  <g fill="none" stroke="url(#ridge)" stroke-linecap="round" filter="url(#glow)">

    <!-- Outermost ridge: broad, open at lower-left (ridge ending) -->
    <path stroke-width="13" opacity="0.85"
          d="M 318 700
             C 250 612, 238 492, 286 392
             C 340 280, 452 210, 566 214
             C 690 218, 786 300, 812 414
             C 836 522, 800 636, 712 706"/>

    <!-- 2nd ridge -->
    <path stroke-width="13" opacity="0.9"
          d="M 360 690
             C 304 612, 296 506, 338 416
             C 386 318, 484 258, 580 266
             C 686 274, 762 348, 778 446
             C 792 538, 760 632, 684 692"/>

    <!-- 3rd ridge -->
    <path stroke-width="12.5"
          d="M 400 672
             C 354 600, 348 510, 386 432
             C 430 344, 514 296, 596 306
             C 684 316, 740 384, 748 470
             C 754 548, 724 624, 656 678"/>

    <!-- 4th ridge -->
    <path stroke-width="12"
          d="M 438 648
             C 400 584, 398 512, 432 444
             C 472 368, 542 330, 610 342
             C 682 354, 720 414, 720 488
             C 720 556, 690 618, 630 662"/>

    <!-- 5th ridge -->
    <path stroke-width="11.5"
          d="M 474 616
             C 446 562, 448 504, 478 450
             C 512 388, 568 358, 622 372
             C 680 386, 700 440, 696 500
             C 692 558, 662 606, 608 640"/>

    <!-- 6th ridge: tightening, beginning the spiral hand-off -->
    <path stroke-width="11"
          d="M 508 580
             C 486 538, 492 492, 520 452
             C 550 408, 596 392, 636 408
             C 674 424, 682 468, 670 510
             C 660 548, 632 580, 590 596"/>

    <!-- 7th ridge: inner spiral, sweeping around toward the keyhole -->
    <path stroke-width="10.5"
          d="M 548 552
             C 528 526, 532 494, 556 470
             C 584 442, 624 446, 644 478
             C 662 508, 650 548, 612 562
             C 580 574, 552 562, 548 552"/>

    <!-- innermost spiral wisp hugging the keyhole -->
    <path stroke-width="9" opacity="0.95"
          d="M 470 470
             C 462 440, 480 412, 510 404"/>

    <!-- short organic ridge fragments (minutiae) for realism -->
    <path stroke-width="9" opacity="0.7"
          d="M 300 470 C 296 524, 302 572, 320 616"/>
    <path stroke-width="8.5" opacity="0.65"
          d="M 728 600 C 752 560, 762 512, 758 466"/>
    <path stroke-width="8" opacity="0.6"
          d="M 540 252 C 588 244, 636 250, 678 270"/>
  </g>

  <!-- Keyhole at center, emphasized -->
  <g>
    <!-- soft halo behind keyhole -->
    <circle cx="512" cy="498" r="62" fill="#312E81" opacity="0.55"/>
    <circle cx="512" cy="498" r="62" fill="url(#key)" opacity="0.18"/>

    <!-- Keyhole shape: circle head + tapered stem -->
    <path d="M 512 452
             C 489 452, 470 471, 470 494
             C 470 510, 479 524, 492 531
             L 483 568
             C 481 575, 486 581, 493 581
             L 531 581
             C 538 581, 543 575, 541 568
             L 532 531
             C 545 524, 554 510, 554 494
             C 554 471, 535 452, 512 452 Z"
          fill="url(#key)" stroke="#312E81" stroke-width="3"/>
  </g>
</svg>
