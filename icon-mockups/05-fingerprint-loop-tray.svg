<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!--
    Monochrome template glyph for the macOS tray (renders to 16px).
    Pure black, fill+alpha only, transparent background.
    3 nested fingerprint arcs around a central keyhole.
    Arcs are stroked then no fill; keyhole is a filled shape.
  -->
  <g fill="none" stroke="#000000" stroke-linecap="round">

    <!-- Outer arc (open at bottom for fingerprint read) -->
    <path stroke-width="2.4"
          d="M 6.4 22.5
             C 3.6 18.4, 3.8 11.6, 8.0 7.8
             C 12.4 3.8, 19.6 3.8, 24.0 7.8
             C 28.2 11.6, 28.4 18.4, 25.6 22.5"/>

    <!-- Middle arc -->
    <path stroke-width="2.4"
          d="M 9.2 21.0
             C 7.3 17.6, 7.6 12.8, 10.6 10.0
             C 13.8 7.0, 18.2 7.0, 21.4 10.0
             C 24.4 12.8, 24.7 17.6, 22.8 21.0"/>

    <!-- Inner arc (tightest, hugging keyhole) -->
    <path stroke-width="2.4"
          d="M 12.2 19.2
             C 11.0 16.6, 11.6 13.4, 14.0 12.0"/>
  </g>

  <!-- Central keyhole: circle head + stem -->
  <path fill="#000000"
        d="M 16 11.2
           C 14.3 11.2, 13 12.5, 13 14.2
           C 13 15.3, 13.6 16.3, 14.5 16.8
           L 13.8 20.0
           C 13.6 20.6, 14.1 21.2, 14.8 21.2
           L 17.2 21.2
           C 17.9 21.2, 18.4 20.6, 18.2 20.0
           L 17.5 16.8
           C 18.4 16.3, 19 15.3, 19 14.2
           C 19 12.5, 17.7 11.2, 16 11.2 Z"/>
</svg>
