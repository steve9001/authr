  <!-- Inner engraved ring -->
  <circle cx="512" cy="512" r="232" fill="none" stroke="#2A2D30" stroke-width="4"/>
  <circle cx="512" cy="512" r="226" fill="none" stroke="#9CA1A6" stroke-opacity="0.4" stroke-width="2"/>

  <!-- Central turned-metal hub -->
  <circle cx="512" cy="512" r="150" fill="url(#hub)"/>
  <circle cx="512" cy="512" r="150" fill="none" stroke="#000000" stroke-opacity="0.45" stroke-width="3"/>
  <circle cx="512" cy="512" r="150" fill="none" stroke="#B7BBC0" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Top sheen overlay for turned-metal feel -->
  <circle cx="512" cy="512" r="300" fill="url(#sheen)"/>

  <!-- Accent indicator marker at 12 o'clock: an arrow/notch that reads as 'a' -->
  <!-- Triangular pointer aimed inward toward the top tick -->
  <path d="M 512 168
           L 540 226
           Q 512 214 484 226 Z"
        fill="url(#accent)"/>
  <!-- Glow seat under marker -->
  <circle cx="512" cy="222" r="16" fill="#F59E0B" fill-opacity="0.25"/>
  <!-- Subtle rounded 'a'-evoking dot on the marker -->
  <circle cx="512" cy="205" r="9" fill="#FFFFFF" fill-opacity="0.55"/>

  <!-- Hub center pivot with accent tie-in (small dial knob) -->
  <circle cx="512" cy="512" r="20" fill="#3A3D40"/>
  <circle cx="512" cy="512" r="20" fill="none" stroke="#000000" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="506" cy="506" r="6" fill="#FFFFFF" fill-opacity="0.35"/>
