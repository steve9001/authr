<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Squircle background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2C2C2E"/>
      <stop offset="1" stop-color="#1C1C1E"/>
    </linearGradient>
    <!-- Outer ring bezel: turned-metal -->
    <linearGradient id="bezel" x1="200" y1="200" x2="824" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9AA0A6"/>
      <stop offset="0.45" stop-color="#5B6066"/>
      <stop offset="0.55" stop-color="#3C4045"/>
      <stop offset="1" stop-color="#7A8086"/>
    </linearGradient>
    <!-- Dial face: brushed steel radial -->
    <radialGradient id="face" cx="512" cy="470" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6E747A"/>
      <stop offset="0.55" stop-color="#52575C"/>
      <stop offset="1" stop-color="#33373B"/>
    </radialGradient>
    <!-- Inner hub -->
    <radialGradient id="hub" cx="512" cy="480" r="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#85898E"/>
      <stop offset="0.6" stop-color="#56595D"/>
      <stop offset="1" stop-color="#303336"/>
    </radialGradient>
    <!-- Soft top highlight on the dial -->
    <radialGradient id="sheen" cx="512" cy="330" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Accent marker gradient (amber) -->
    <linearGradient id="accent" x1="512" y1="150" x2="512" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="dropShadow" cx="512" cy="540" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0.7" stop-color="#000000" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- macOS squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#bg)"/>

  <!-- Cast shadow under the dial for depth -->
  <ellipse cx="512" cy="540" rx="340" ry="340" fill="url(#dropShadow)"/>

  <!-- Outer metal bezel -->
  <circle cx="512" cy="512" r="338" fill="url(#bezel)"/>
  <circle cx="512" cy="512" r="338" fill="none" stroke="#000000" stroke-opacity="0.35" stroke-width="2"/>

  <!-- Recessed dial face -->
  <circle cx="512" cy="512" r="300" fill="url(#face)"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#000000" stroke-opacity="0.5" stroke-width="3"/>

  <!-- Tick marks around the rim -->
  <g stroke="#D7DBDF" stroke-opacity="0.85" stroke-linecap="round">
