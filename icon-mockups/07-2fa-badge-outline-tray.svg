<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!--
    authr menu-bar template icon — "2FA badge" (outline).
    Pure black, transparent bg, fill+alpha only (macOS inverts automatically).
    A rounded-square border frames solid "2FA" text. The thin frame + positive
    text keep more open area, so the digits stay readable when light-on-dark.
  -->
  <!-- frame: outer rounded rect minus inner rounded rect = stroke ring -->
  <path fill="#000000" fill-rule="evenodd"
        d="M 9 2.5 L 23 2.5 C 26.6 2.5 29.5 5.4 29.5 9 L 29.5 23
           C 29.5 26.6 26.6 29.5 23 29.5 L 9 29.5 C 5.4 29.5 2.5 26.6 2.5 23
           L 2.5 9 C 2.5 5.4 5.4 2.5 9 2.5 Z
           M 9.2 5.0 C 6.9 5.0 5.0 6.9 5.0 9.2 L 5.0 22.8
           C 5.0 25.1 6.9 27.0 9.2 27.0 L 22.8 27.0 C 25.1 27.0 27.0 25.1 27.0 22.8
           L 27.0 9.2 C 27.0 6.9 25.1 5.0 22.8 5.0 Z"/>
  <text x="16" y="16.6" fill="#000000" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="11" letter-spacing="-0.6"
        dominant-baseline="central">2FA</text>
</svg>
